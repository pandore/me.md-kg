<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>me.md-kg Onboarding</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #000000);
    --hint: var(--tg-theme-hint-color, #999999);
    --link: var(--tg-theme-link-color, #2481cc);
    --btn: var(--tg-theme-button-color, #2481cc);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  .screen {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    padding: 24px 20px;
    animation: fadeIn 0.3s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Progress bar */
  .progress-container {
    margin-bottom: 24px;
  }
  .progress-label {
    font-size: 13px;
    color: var(--hint);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }
  .progress-bar {
    height: 4px;
    background: var(--secondary-bg);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--btn);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Welcome screen */
  .welcome-icon {
    font-size: 64px;
    text-align: center;
    margin: 40px 0 24px;
  }
  .welcome-title {
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 16px;
    line-height: 1.2;
  }
  .welcome-desc {
    font-size: 16px;
    color: var(--hint);
    text-align: center;
    line-height: 1.5;
    margin-bottom: 40px;
    padding: 0 12px;
  }

  /* Buttons */
  .btn-primary {
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 12px;
    padding: 16px 32px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    min-height: 52px;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary:active { opacity: 0.7; }
  .btn-primary:disabled { opacity: 0.5; cursor: default; }

  .btn-secondary {
    background: none;
    color: var(--link);
    border: none;
    padding: 12px;
    font-size: 15px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-secondary:active { opacity: 0.6; }

  /* Question screen */
  .question-text {
    font-size: 20px;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 24px;
    flex-shrink: 0;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
    flex: 1;
  }

  .option-btn {
    background: var(--secondary-bg);
    color: var(--text);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 15px;
    text-align: left;
    cursor: pointer;
    line-height: 1.4;
    transition: border-color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
    min-height: 48px;
  }
  .option-btn:active { border-color: var(--btn); }
  .option-btn.selected {
    border-color: var(--btn);
    background: color-mix(in srgb, var(--btn) 10%, var(--secondary-bg));
  }

  /* Free text input */
  .input-row {
    display: flex;
    gap: 8px;
    margin-top: auto;
    padding-top: 12px;
    flex-shrink: 0;
  }
  .text-input {
    flex: 1;
    background: var(--secondary-bg);
    color: var(--text);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 16px;
    outline: none;
    min-height: 48px;
    resize: none;
  }
  .text-input:focus { border-color: var(--btn); }
  .text-input::placeholder { color: var(--hint); }

  .send-btn {
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 12px;
    width: 48px;
    height: 48px;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .send-btn:disabled { opacity: 0.4; }

  .skip-row {
    text-align: center;
    padding-top: 8px;
    flex-shrink: 0;
  }

  /* Area transition */
  .transition-card {
    text-align: center;
    padding: 40px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .transition-check {
    font-size: 48px;
    margin-bottom: 20px;
  }
  .transition-area {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .transition-facts {
    font-size: 16px;
    color: var(--hint);
    margin-bottom: 32px;
  }

  /* Summary screen */
  .summary-title {
    font-size: 24px;
    font-weight: 700;
    text-align: center;
    margin: 24px 0 8px;
  }
  .summary-subtitle {
    font-size: 16px;
    color: var(--hint);
    text-align: center;
    margin-bottom: 28px;
  }
  .summary-section {
    margin-bottom: 20px;
  }
  .summary-section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .summary-area {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--secondary-bg);
    font-size: 15px;
  }
  .summary-area-count {
    color: var(--hint);
    font-weight: 500;
  }
  .summary-highlight {
    background: var(--secondary-bg);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
    font-size: 15px;
    line-height: 1.4;
  }
  .summary-stats {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin: 24px 0;
  }
  .stat-box {
    text-align: center;
    background: var(--secondary-bg);
    border-radius: 12px;
    padding: 16px 20px;
    flex: 1;
  }
  .stat-number {
    font-size: 28px;
    font-weight: 700;
    color: var(--btn);
  }
  .stat-label {
    font-size: 12px;
    color: var(--hint);
    margin-top: 4px;
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 20px;
    color: var(--hint);
    font-size: 15px;
  }
  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--secondary-bg);
    border-top-color: var(--btn);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Facts toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 0.9; }
</style>
</head>
<body>

<!-- Welcome Screen -->
<div id="screen-welcome" class="screen active">
  <div class="welcome-icon">&#129504;</div>
  <h1 class="welcome-title">Build your<br>knowledge graph</h1>
  <p class="welcome-desc">
    Answer a few questions so AI tools can truly understand you.
    Your data stays on your machine.
  </p>
  <div style="flex:1"></div>
  <button class="btn-primary" id="btn-start">Start</button>
</div>

<!-- Question Screen -->
<div id="screen-question" class="screen">
  <div class="progress-container">
    <div class="progress-label">
      <span id="progress-text"></span>
      <span id="facts-count"></span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <div class="question-text" id="question-text"></div>

  <div class="options-list" id="options-list"></div>

  <div class="input-row">
    <textarea class="text-input" id="text-input" rows="1" placeholder="Type your answer..."></textarea>
    <button class="send-btn" id="btn-send" disabled>&#10148;</button>
  </div>

  <div class="skip-row">
    <button class="btn-secondary" id="btn-skip">Skip this topic &#8594;</button>
  </div>
</div>

<!-- Loading Screen -->
<div id="screen-loading" class="screen">
  <div style="flex:1;display:flex;align-items:center;justify-content:center;">
    <div class="loading">
      <div class="spinner"></div>
      <span>Thinking...</span>
    </div>
  </div>
</div>

<!-- Area Transition Screen -->
<div id="screen-transition" class="screen">
  <div class="transition-card">
    <div class="transition-check">&#10003;</div>
    <div class="transition-area" id="transition-area"></div>
    <div class="transition-facts" id="transition-facts"></div>
    <button class="btn-primary" id="btn-continue">Continue</button>
  </div>
</div>

<!-- Summary Screen -->
<div id="screen-summary" class="screen">
  <div class="welcome-icon">&#127881;</div>
  <div class="summary-title">Done!</div>
  <div class="summary-subtitle" id="summary-subtitle"></div>

  <div class="summary-stats" id="summary-stats"></div>

  <div class="summary-section" id="summary-highlights-section" style="display:none">
    <div class="summary-section-title">Highlights</div>
    <div id="summary-highlights"></div>
  </div>

  <div class="summary-section">
    <div class="summary-section-title">Facts by area</div>
    <div id="summary-areas"></div>
  </div>

  <div style="flex:1"></div>
  <button class="btn-primary" id="btn-close">Close</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // --- Telegram WebApp ---
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  const initData = tg?.initData || '';
  const tgUser = tg?.initDataUnsafe?.user;
  const userLang = tgUser?.language_code || navigator.language?.slice(0, 2) || 'en';

  // --- API helpers ---
  const API_BASE = window.location.origin;

  async function api(method, path, body) {
    const opts = {
      method,
      headers: {
        'Content-Type': 'application/json',
      },
    };
    if (initData) {
      opts.headers['Authorization'] = 'tma ' + initData;
    }
    if (body) {
      opts.body = JSON.stringify(body);
    }

    const res = await fetch(API_BASE + path, opts);
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(err.error || 'Request failed');
    }
    return res.json();
  }

  // --- State ---
  let sessionId = tgUser?.id?.toString() || 'default';
  let currentArea = '';
  let lastCompletedArea = '';
  let lastAreaFacts = 0;

  // --- Screen management ---
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
  }

  function showToast(msg, duration) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration || 2000);
  }

  // --- Welcome ---
  document.getElementById('btn-start').addEventListener('click', async () => {
    showScreen('loading');
    try {
      const data = await api('POST', '/api/onboard/start', {
        language: userLang,
        telegramUser: tgUser ? {
          id: tgUser.id,
          firstName: tgUser.first_name,
          languageCode: tgUser.language_code,
        } : undefined,
      });

      sessionId = data.sessionId || sessionId;

      if (data.isComplete) {
        await showSummary();
      } else {
        renderQuestion(data);
      }
    } catch (e) {
      showScreen('welcome');
      showToast('Error: ' + e.message, 3000);
    }
  });

  // --- Question rendering ---
  function renderQuestion(data) {
    const q = data.question;
    if (!q) {
      showSummary();
      return;
    }

    // Track area transitions
    if (currentArea && currentArea !== q.area) {
      lastCompletedArea = currentArea;
      lastAreaFacts = data.progress?.factsExtracted || 0;
    }
    currentArea = q.area;

    // Progress
    const completed = data.progress?.completedAreas || 0;
    const total = data.progress?.totalAreas || 7;
    document.getElementById('progress-text').textContent =
      (completed + 1) + '/' + total + ' — ' + q.area;
    document.getElementById('facts-count').textContent =
      (data.progress?.factsExtracted || 0) + ' facts';
    document.getElementById('progress-fill').style.width =
      ((completed / total) * 100) + '%';

    // Question text
    document.getElementById('question-text').innerHTML = formatMessage(q.text);

    // Options
    const optList = document.getElementById('options-list');
    optList.innerHTML = '';

    if (q.options && q.options.length > 0) {
      q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.text;
        btn.addEventListener('click', () => {
          // Deselect others
          optList.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          // Put text in input
          document.getElementById('text-input').value = opt.text;
          document.getElementById('btn-send').disabled = false;
        });
        optList.appendChild(btn);
      });
    }

    // Reset input
    const input = document.getElementById('text-input');
    input.value = '';
    document.getElementById('btn-send').disabled = true;

    showScreen('question');
    input.focus();
  }

  function formatMessage(text) {
    // Simple markdown bold support
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  // --- Text input handling ---
  const textInput = document.getElementById('text-input');
  const sendBtn = document.getElementById('btn-send');

  textInput.addEventListener('input', () => {
    sendBtn.disabled = !textInput.value.trim();
    // Auto-resize
    textInput.style.height = 'auto';
    textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
    // Deselect option buttons
    document.querySelectorAll('.option-btn.selected').forEach(b => b.classList.remove('selected'));
  });

  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (textInput.value.trim()) submitAnswer();
    }
  });

  sendBtn.addEventListener('click', () => {
    if (textInput.value.trim()) submitAnswer();
  });

  // --- Submit answer ---
  async function submitAnswer() {
    const answer = textInput.value.trim();
    if (!answer) return;

    showScreen('loading');
    try {
      const data = await api('POST', '/api/onboard/answer', {
        sessionId,
        answer,
      });

      if (data.factsJustExtracted > 0) {
        showToast('+' + data.factsJustExtracted + ' facts extracted');
      }

      if (data.isComplete) {
        await showSummary();
      } else {
        renderQuestion(data);
      }
    } catch (e) {
      showScreen('question');
      showToast('Error: ' + e.message, 3000);
    }
  }

  // --- Skip ---
  document.getElementById('btn-skip').addEventListener('click', async () => {
    showScreen('loading');
    try {
      const data = await api('POST', '/api/onboard/answer', {
        sessionId,
        answer: 'skip',
      });

      if (data.isComplete) {
        await showSummary();
      } else {
        renderQuestion(data);
      }
    } catch (e) {
      showScreen('question');
      showToast('Error: ' + e.message, 3000);
    }
  });

  // --- Summary ---
  async function showSummary() {
    try {
      const data = await api('GET', '/api/onboard/summary?sessionId=' + encodeURIComponent(sessionId));

      document.getElementById('summary-subtitle').textContent =
        'I learned ' + data.totalFacts + ' facts about you';

      // Stats
      const statsEl = document.getElementById('summary-stats');
      statsEl.innerHTML = `
        <div class="stat-box">
          <div class="stat-number">${data.totalFacts}</div>
          <div class="stat-label">Facts</div>
        </div>
        <div class="stat-box">
          <div class="stat-number">${data.entities}</div>
          <div class="stat-label">Entities</div>
        </div>
        <div class="stat-box">
          <div class="stat-number">${data.relations}</div>
          <div class="stat-label">Relations</div>
        </div>
      `;

      // Highlights
      if (data.highlights && data.highlights.length > 0) {
        const hlSection = document.getElementById('summary-highlights-section');
        hlSection.style.display = '';
        const hlEl = document.getElementById('summary-highlights');
        hlEl.innerHTML = data.highlights
          .map(h => '<div class="summary-highlight">' + escapeHtml(h) + '</div>')
          .join('');
      }

      // By area
      const areasEl = document.getElementById('summary-areas');
      areasEl.innerHTML = Object.entries(data.byArea || {})
        .map(([area, count]) => `
          <div class="summary-area">
            <span>${escapeHtml(area)}</span>
            <span class="summary-area-count">${count} facts</span>
          </div>
        `)
        .join('');

      showScreen('summary');
    } catch (e) {
      showToast('Could not load summary: ' + e.message, 3000);
      showScreen('summary');
    }
  }

  // --- Close ---
  document.getElementById('btn-close').addEventListener('click', () => {
    if (tg) {
      tg.close();
    } else {
      showToast('Done! You can close this tab.');
    }
  });

  function escapeHtml(s) {
    const el = document.createElement('span');
    el.textContent = s;
    return el.innerHTML;
  }
})();
</script>
</body>
</html>
